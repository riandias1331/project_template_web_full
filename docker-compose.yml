version: '3.8'

services:
  # ==============================================
  # POSTGRES LOCAL (opcional - se quiser usar local)
  # ==============================================
  postgres:
    image: postgres:15-alpine
    container_name: app_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-galoucura}
      POSTGRES_DB: ${DB_NAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    profiles:
      - local  # Só sobe se usar --profile local

  # ==============================================
  # BACKEND
  # ==============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app_backend
    restart: always
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - MONGO_URL=mongodb+srv://pereiradiasrian:galoucura@cluster0.lncgv.mongodb.net/Users?appName=Cluster0
      - JWT_SECRET=your_jwt_secret_here
      - DATABASE_URL=postgresql://neondb_owner:INJlZm2C1VaR@ep-green-pond-a5njdqwm-pooler.us-east-2.aws.neon.tech/neondb?sslmode=require
      - NEON_DATABASE_URL=postgresql://neondb_owner:INJlZm2C1VaR@ep-green-pond-a5njdqwm-pooler.us-east-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    networks:
      - app_network
#    depends_on:
#     - postgres
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==============================================
  # FRONTEND
  # ==============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      #- VITE_API_URL=http://${VM_IP:-localhost}:3333/api
      - VITE_API_URL=http://backend:3333/api

    env_file:
      - ./frontend/.env
    networks:
      - app_network
    depends_on:
      - backend

  # ==============================================
  # NGNIX (opcional - para produção)
  # ==============================================
  nginx:
    image: nginx:alpine
    container_name: app_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_network
    depends_on:
      - backend
      - frontend
    profiles:
      - production

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: